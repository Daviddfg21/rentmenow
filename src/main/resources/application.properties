# Puerto del servidor
server.port=8081

# Base de datos - MariaDB/MySQL
spring.datasource.url=jdbc:mariadb://localhost:3306/rentmenow_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Europe/Madrid
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=12345

# JPA - IMPORTANTE: Usar create-drop para empezar limpio
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# CORS
app.cors.allowed-origins=http://localhost:3000

# Logging
logging.level.com.rentmenow=DEBUG